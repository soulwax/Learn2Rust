# Deploys the static landing page in `site/` to GitHub Pages.
#
# One-time setup in the repository: Settings → Pages → "Build and deployment" →
# Source → "GitHub Actions". After that, every push to `main` that touches
# `site/` (or this workflow) publishes the page.
name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# Grant the token the permissions Pages deployment needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Never cancel an in-progress deployment; queue the next one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
